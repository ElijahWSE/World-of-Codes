<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World of Codes</title>
  <style>
    /* Remove all default browser spacing and scrollbars */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden; /* No scrollbars — game canvas fills the viewport */
    }

    /* Full-viewport host div — Phaser's Scale Manager (FIT + autoCenter) sizes
       and centers the canvas inside this automatically. */
    #game-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- Phaser boots from main.js and appends its canvas into #game-container automatically -->
  <script type="module" src="/src/engine/main.js"></script>
</body>
</html>
